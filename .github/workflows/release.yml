name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Build CLI
        working-directory: cli
        run: |
          mkdir -p ../dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOWORK=off \
            go build -o ../dist/batchjob-cli-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/batchjob-cli
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: batchjob-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/batchjob-cli-${{ matrix.goos }}-${{ matrix.goarch }}

  package-assets:
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Normalize dist layout
        run: |
          mkdir -p release
          while IFS= read -r binary; do
            name="$(basename "$binary")"
            staging="$(mktemp -d)"
            cp "$binary" "$staging/batchjob-cli"
            tar -C "$staging" -czf "release/${name}.tar.gz" batchjob-cli
            rm -rf "$staging"
          done < <(find dist -type f -name 'batchjob-cli-*' | sort)
          tar -czf release/batchjob-skills.tar.gz skills
          cp install.sh manifest.json README.md release/
          (cd release && sha256sum * > checksums.txt)
      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release/*
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is required to publish Formula/batchjob-cli.rb" >&2
            exit 1
          fi

          tap_dir="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/cocovs/homebrew-tap.git" "$tap_dir"
          ./scripts/render-homebrew-formula.sh --tag "$RELEASE_TAG" --checksums release/checksums.txt > "$tap_dir/Formula/batchjob-cli.rb"

          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/batchjob-cli.rb; then
            echo "Formula/batchjob-cli.rb is already up to date"
            exit 0
          fi

          git add Formula/batchjob-cli.rb
          git commit -m "batchjob-cli ${RELEASE_TAG}"
          git push origin main
