name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
      - name: Build CLI
        working-directory: cli
        run: |
          mkdir -p ../dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOWORK=off \
            go build -o ../dist/batchjob-cli-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/batchjob-cli
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: batchjob-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/batchjob-cli-${{ matrix.goos }}-${{ matrix.goarch }}

  package-assets:
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Normalize dist layout
        run: |
          mkdir -p release
          while IFS= read -r binary; do
            name="$(basename "$binary")"
            staging="$(mktemp -d)"
            cp "$binary" "$staging/batchjob-cli"
            tar -C "$staging" -czf "release/${name}.tar.gz" batchjob-cli
            rm -rf "$staging"
          done < <(find dist -type f -name 'batchjob-cli-*' | sort)
          tar -czf release/batchjob-skills.tar.gz skills
          cp install.sh manifest.json README.md release/
          (cd release && sha256sum * > checksums.txt)
      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release/*
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
